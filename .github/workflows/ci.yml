name: RevSync CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Django System Check
        run: python manage.py check

      - name: Migration Files Up To Date
        run: python manage.py makemigrations --check --dry-run

      - name: Apply Migrations (CI DB)
        run: python manage.py migrate --noinput

      - name: Auth + Preferences + Health Tests
        run: python manage.py test users.tests.test_auth_flow users.tests.test_preferences_api core.tests.test_health

  web:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build (includes type check)
        run: npm run build
